name: Deploy to VPS

on:
  push:
    branches:
      - main # Change this if your main branch has a different name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Adjust to match your project's node version

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create deployment artifact tarball
        run: |
          # Package all necessary files for production
          # Explicitly include only what's needed
          tar -czf deploy.tar.gz \
            package.json \
            package-lock.json \
            build/ \
            public/ \
            .env
          
          # Verify tarball was created successfully
          if [ ! -f deploy.tar.gz ]; then
            echo "Error: Failed to create deployment artifact"
            exit 1
          fi

      - name: Copy artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy.tar.gz
          target: /tmp/dnt-be-deploy

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e  # Exit on any error
            
            # Define directories
            DEPLOY_DIR="/tmp/dnt-be-deploy"
            APP_DIR="/root/dnt-be"
            BACKUP_DIR="/root/dnt-be-backup"
            
            # Create directories
            mkdir -p "$APP_DIR"
            mkdir -p "$BACKUP_DIR"
            
            # Extract to temporary directory first
            TEMP_EXTRACT="/tmp/dnt-extract-$$"
            mkdir -p "$TEMP_EXTRACT"
            tar -xzf "$DEPLOY_DIR/deploy.tar.gz" -C "$TEMP_EXTRACT"
            
            # Backup current production (if it exists)
            if [ -d "$APP_DIR/build" ]; then
              cp -r "$APP_DIR/build" "$BACKUP_DIR/build-$(date +%s)" || true
            fi
            
            # Move new build to app directory
            cp -r "$TEMP_EXTRACT"/* "$APP_DIR/"
            
            # Clean up temporary files
            rm -rf "$TEMP_EXTRACT"
            rm "$DEPLOY_DIR/deploy.tar.gz"
            
            # Navigate to app directory
            cd "$APP_DIR"
            
            # Install production dependencies
            npm ci --omit=dev
            
            # Check if PM2 process exists
            if pm2 describe dnt-be > /dev/null 2>&1; then
              echo "Restarting existing PM2 process..."
              pm2 restart dnt-be --update-env
            else
              echo "Starting new PM2 process..."
              pm2 start npm --name "dnt-be" -- run start
            fi
            
            # Save PM2 state for startup on reboot
            pm2 save
            
            # Health check - wait for service to be ready
            echo "Waiting for service to start..."
            for i in {1..30}; do
              if curl -f http://localhost:1337/health > /dev/null 2>&1; then
                echo "✓ Service is healthy"
                exit 0
              fi
              echo "Attempt $i/30 - waiting for service..."
              sleep 2
            done
            
            echo "⚠ Service did not respond to health check"
            exit 1