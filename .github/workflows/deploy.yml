name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ─── Step 1: Build Code ────────────────────────────────────────
      - name: Create .env file for build
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # ─── Step 2: Build & Push Docker Image to Docker Hub ──────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${{ secrets.DOCKERHUB_USERNAME }}/dnt-be:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.tag.outputs.TAG }} -t ${{ secrets.DOCKERHUB_USERNAME }}/dnt-be:latest .
          echo "✓ Docker image built: ${{ steps.tag.outputs.TAG }}"

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ steps.tag.outputs.TAG }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dnt-be:latest
          echo "✓ Image pushed to Docker Hub"

      # ─── Step 3: Write .env on VPS ─────────────────────────────────
      - name: Write .env file on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.SSH_USERNAME }}/dnt-be"
            mkdir -p "$APP_DIR"

            printf '%s\n' '${{ secrets.ENV_FILE }}' > "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
            echo "✓ .env written to $APP_DIR/.env"

      # ─── Step 4: Pull Image & Start Container on VPS ──────────────
      - name: Pull image and start container on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.SSH_USERNAME }}/dnt-be"
            IMAGE="${{ steps.tag.outputs.TAG }}"

            echo "========================================="
            echo "Starting Docker deployment..."
            echo "Image: $IMAGE"
            echo "========================================="

            # Pull the new image from Docker Hub
            echo "Pulling image..."
            docker pull "$IMAGE"
            echo "✓ Image pulled"

            # Stop and remove existing container if it exists
            if docker inspect dnt-be > /dev/null 2>&1; then
              echo "Stopping existing container..."
              docker stop dnt-be || true
              docker rm dnt-be || true
              echo "✓ Old container removed"
            fi

            # Start new container
            echo "Starting new container..."
            docker run -d \
              --name dnt-be \
              --restart unless-stopped \
              -p 1337:1337 \
              --env-file "$APP_DIR/.env" \
              "$IMAGE"
            echo "✓ Container started"

            # Remove unused images to keep disk clean
            docker image prune -f || true
            echo "✓ Pruned unused images"

            # Health check
            echo ""
            echo "Waiting for service to be healthy..."
            for i in {1..40}; do
              if curl -sf http://localhost:1337/_health > /dev/null 2>&1; then
                echo "✓ Service is healthy!"
                echo ""
                echo "========================================="
                echo "✅ Deployment successful!"
                echo "========================================="
                exit 0
              fi

              if [ $((i % 5)) -eq 0 ]; then
                echo "  Waiting... (attempt $i/40)"
              fi
              sleep 2
            done

            echo "❌ Health check failed after 80 seconds"
            echo ""
            echo "Container logs:"
            docker logs dnt-be --tail 30
            exit 1