name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: /root/dnt-be-deploy
          rm: true

      - name: Deploy with Docker on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/dnt-be-deploy

            # Stop and remove existing container if running
            docker stop dnt-be 2>/dev/null || true
            docker rm dnt-be 2>/dev/null || true

            # Build the Docker image
            docker build -t dnt-be:latest .

            # Run the container
            docker run -d \
              --name dnt-be \
              --restart unless-stopped \
              -p 1337:1337 \
              --env-file .env \
              dnt-be:latest

            # Prune old unused images to save disk space
            docker image prune -f

            echo "✅ Deployment complete!"
