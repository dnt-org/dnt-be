name: Deploy to VPS

on:
  push:
    branches:
      - main # Change this if your main branch has a different name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Adjust to match your project's node version

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create deployment artifact tarball
        run: |
          # Package all necessary files for production
          # Excludes unneeded files like the raw src, tests, and node_modules
          tar -czf deploy.tar.gz package.json package-lock.json build config database public .strapi-updater.json .env || true

      - name: Copy artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 27.71.27.147
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          source: deploy.tar.gz
          target: /root/dnt-be-deploy

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 27.71.27.147
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Create deployment directory if it doesn't exist
            mkdir -p /root/dnt-be
            
            # Extract the built artifact into the app directory
            tar -xzf /root/dnt-be-deploy/deploy.tar.gz -C /root/dnt-be
            
            # Clean up the artifact
            rm /root/dnt-be-deploy/deploy.tar.gz
            
            # Navigate to the app directory
            cd /root/dnt-be
            
            # Install exactly the production dependencies
            npm ci --omit=dev
            
            # Check if PM2 process exists, restart if it does, start if it doesn't
            pm2 describe dnt-be > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart dnt-be --update-env
            else
              pm2 start npm --name "dnt-be" -- run start
            fi
            
            # Save the PM2 state to resurrect on reboot
            pm2 save
