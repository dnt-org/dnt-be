name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ─── Step 1: Build Code ────────────────────────────────────────
      - name: Create .env file for build
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # ─── Step 2: Build Docker Image (includes env via --build-arg) ─
      - name: Build Docker image
        run: |
          # Parse each line from ENV_FILE and pass as --build-arg
          BUILD_ARGS=""
          while IFS= read -r line; do
            # Skip empty lines and comments
            [[ -z "$line" || "$line" == \#* ]] && continue
            # Extract key only (docker build-arg needs KEY=VALUE)
            BUILD_ARGS="$BUILD_ARGS --build-arg $line"
          done <<< "${{ secrets.ENV_FILE }}"

          docker build $BUILD_ARGS -t dnt-be:latest .
          echo "✓ Docker image built"

      - name: Save Docker image to tarball
        run: |
          docker save dnt-be:latest | gzip > dnt-be.tar.gz
          echo "✓ Docker image saved as dnt-be.tar.gz ($(du -sh dnt-be.tar.gz | cut -f1))"

      # ─── Step 3: Copy to VPS ───────────────────────────────────────
      - name: Copy Docker image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: dnt-be.tar.gz
          target: /tmp/dnt-be-deploy

      # ─── Step 4: Write .env on VPS ─────────────────────────────────
      - name: Write .env file on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.SSH_USERNAME }}/dnt-be"
            mkdir -p "$APP_DIR"

            # Write env file from secret
            printf '%s\n' '${{ secrets.ENV_FILE }}' > "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
            echo "✓ .env file written to $APP_DIR/.env"

      # ─── Step 5: Load Image & Start Container on VPS ──────────────
      - name: Start Docker container on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="/home/${{ secrets.SSH_USERNAME }}/dnt-be"
            IMAGE_TAR="/tmp/dnt-be-deploy/dnt-be.tar.gz"

            echo "========================================="
            echo "Starting Docker deployment..."
            echo "========================================="

            # Load the new image
            echo "Loading Docker image..."
            docker load < "$IMAGE_TAR"
            echo "✓ Docker image loaded"

            # Stop and remove existing container if running
            if docker inspect dnt-be > /dev/null 2>&1; then
              echo "Stopping existing container..."
              docker stop dnt-be || true
              docker rm dnt-be || true
              echo "✓ Old container removed"
            fi

            # Start new container
            echo "Starting new container..."
            docker run -d \
              --name dnt-be \
              --restart unless-stopped \
              -p 1337:1337 \
              --env-file "$APP_DIR/.env" \
              dnt-be:latest
            echo "✓ Container started"

            # Clean up tarball
            rm -f "$IMAGE_TAR"
            echo "✓ Cleaned up tarball"

            # Remove dangling images to free disk space
            docker image prune -f || true
            echo "✓ Pruned dangling images"

            # Health check
            echo ""
            echo "Waiting for service to be healthy..."
            for i in {1..40}; do
              if curl -sf http://localhost:1337/_health > /dev/null 2>&1; then
                echo "✓ Service is healthy!"
                echo ""
                echo "========================================="
                echo "✅ Deployment successful!"
                echo "========================================="
                exit 0
              fi

              if [ $((i % 5)) -eq 0 ]; then
                echo "  Waiting... (attempt $i/40)"
              fi
              sleep 2
            done

            echo "❌ Service health check failed after 80 seconds"
            echo ""
            echo "Container logs:"
            docker logs dnt-be --tail 30
            exit 1